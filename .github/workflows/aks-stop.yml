name: Stop AKS Cluster

on:
  schedule:
    - cron: '0 12 * * *' # 10 PM AEST (UTC+10)
  workflow_dispatch:
    inputs:
      resource_group:
        description: 'Azure resource group'
        required: false
        default: 'rg-ytsumm-prd-ci'
      cluster_name:
        description: 'AKS cluster name'
        required: false
        default: 'aks-ytsumm-prd-ci'

permissions:
  id-token: write
  contents: read

jobs:
  stop-aks:
    name: Stop AKS Cluster
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Check current cluster state
        id: check-state
        run: |
          state=$(az aks show \
            --name "${{ inputs.cluster_name || 'aks-ytsumm-prd-ci' }}" \
            --resource-group "${{ inputs.resource_group || 'rg-ytsumm-prd-ci' }}" \
            --query "powerState.code" -o tsv 2>/dev/null || echo "Unknown")
          echo "Current state: $state"
          echo "state=$state" >> "$GITHUB_OUTPUT"

      - name: Stop AKS cluster
        if: steps.check-state.outputs.state == 'Running'
        run: |
          echo "Stopping cluster ${{ inputs.cluster_name || 'aks-ytsumm-prd-ci' }} in ${{ inputs.resource_group || 'rg-ytsumm-prd-ci' }}..."
          az aks stop \
            --name "${{ inputs.cluster_name || 'aks-ytsumm-prd-ci' }}" \
            --resource-group "${{ inputs.resource_group || 'rg-ytsumm-prd-ci' }}"
          echo "Cluster stopped."

      - name: Cluster already stopped
        if: steps.check-state.outputs.state == 'Stopped'
        run: echo "Cluster is already Stopped — nothing to do."

      - name: Verify final state
        run: |
          state=$(az aks show \
            --name "${{ inputs.cluster_name || 'aks-ytsumm-prd-ci' }}" \
            --resource-group "${{ inputs.resource_group || 'rg-ytsumm-prd-ci' }}" \
            --query "powerState.code" -o tsv)
          echo "Final state: $state"
          if [ "$state" != "Stopped" ]; then
            echo "ERROR: expected Stopped, got $state"
            exit 1
          fi
