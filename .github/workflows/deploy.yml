# =============================================================================
# Shared Infrastructure - Unified Deploy Pipeline
# =============================================================================
# Single pipeline for all shared infrastructure changes:
#   PR to main    → Terraform plan (post to PR) + K8s dry-run
#   Push to main  → Terraform plan + apply → K8s deploy (ArgoCD)
#   Manual        → Terraform plan + optional apply → K8s deploy
#
# Replaces: deploy-infra.yml, terraform-plan.yml
# =============================================================================

name: Deploy

on:
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
      - 'k8s/**'
      - '.github/workflows/deploy.yml'
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - 'k8s/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      run_apply:
        description: 'Apply terraform changes'
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read
  pull-requests: write

# Only one deploy at a time
concurrency:
  group: deploy-infra
  cancel-in-progress: false

jobs:
  # ===========================================================================
  # Stage 1: Terraform Plan
  # ===========================================================================
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    outputs:
      plan_summary: ${{ steps.plan.outputs.plan_summary }}
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: true
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform with Azure
        uses: ./.github/actions/setup-terraform-azure
        with:
          terraform-version: '1.12'
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Plan
        id: plan
        uses: ./.github/actions/terraform-plan
        with:
          working-directory: terraform
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        continue-on-error: ${{ github.event_name == 'pull_request' }}

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/post-terraform-plan
        with:
          plan-summary: ${{ steps.plan.outputs.plan_summary }}
          plan-json-path: ${{ steps.plan.outputs.plan_json_path }}
          plan-outcome: ${{ steps.plan.outcome }}

      - name: Plan Status Check
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: |
            terraform/tfplan
            terraform/plan_output.txt
            terraform/plan.json
          retention-days: 7

  # ===========================================================================
  # Stage 2: Terraform Apply (push to main or manual dispatch only)
  # ===========================================================================
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: |
      needs.terraform-plan.result == 'success' &&
      (github.event_name == 'push' ||
       (github.event_name == 'workflow_dispatch' && inputs.run_apply == true))
    environment: production
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: true
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform with Azure
        uses: ./.github/actions/setup-terraform-azure
        with:
          terraform-version: '1.12'
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: terraform

      - name: Terraform Init
        run: terraform init -input=false -no-color

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

  # ===========================================================================
  # Stage 3: Deploy K8s Infrastructure via ArgoCD
  # ===========================================================================
  deploy-k8s:
    name: Deploy K8s Infrastructure
    runs-on: ubuntu-latest
    needs: [terraform-plan, terraform-apply]
    # Run after terraform-apply on push/dispatch, or after terraform-plan on PR (dry-run)
    if: |
      always() &&
      needs.terraform-plan.result == 'success' &&
      (needs.terraform-apply.result == 'success' || needs.terraform-apply.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Azure and AKS
        uses: AshleyHollis/shared-infra/.github/actions/setup-azure-aks@v1
        with:
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # On PR, only validate manifests (dry-run)
      - name: Validate K8s manifests (dry-run)
        if: github.event_name == 'pull_request'
        run: |
          echo "=== Dry-run: Validating K8s manifests ==="
          kubectl apply --dry-run=server -f k8s/argocd/repo-secret.yaml
          kubectl apply --dry-run=server -f k8s/argocd/infra-apps.yaml
          echo "✅ All manifests are valid"

      # On push/dispatch, actually deploy
      - name: Apply repo secret
        if: github.event_name != 'pull_request'
        run: kubectl apply -f k8s/argocd/repo-secret.yaml

      - name: Apply infrastructure applications
        if: github.event_name != 'pull_request'
        run: kubectl apply -f k8s/argocd/infra-apps.yaml

      - name: Wait for gateway-api sync
        if: github.event_name != 'pull_request'
        uses: AshleyHollis/shared-infra/.github/actions/argocd-wait@v1
        with:
          app-name: gateway-api
          namespace: gateway-system
          max-wait-seconds: '300'
          cleanup-stuck-operations: 'true'
          auto-recovery: 'true'

      - name: Wait for certificates sync
        if: github.event_name != 'pull_request'
        uses: AshleyHollis/shared-infra/.github/actions/argocd-wait@v1
        with:
          app-name: certificates
          namespace: gateway-system
          max-wait-seconds: '120'

      - name: Wait for external-dns sync
        if: github.event_name != 'pull_request'
        uses: AshleyHollis/shared-infra/.github/actions/argocd-wait@v1
        with:
          app-name: external-dns
          namespace: gateway-system
          max-wait-seconds: '120'

      - name: Verify all infrastructure applications
        if: github.event_name != 'pull_request'
        run: |
          echo "=== Final Infrastructure Status ==="
          kubectl get applications -n argocd -o custom-columns=\
          'NAME:.metadata.name,SYNC:.status.sync.status,HEALTH:.status.health.status'
