# =============================================================================
# Deploy Shared Infrastructure to AKS
# =============================================================================
# Applies ArgoCD Application manifests to the cluster and waits for sync.
# Runs on every push to main and supports manual trigger.
# =============================================================================

name: Deploy Infrastructure

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy ArgoCD Infrastructure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Azure and AKS
        uses: AshleyHollis/shared-infra/.github/actions/setup-azure-aks@v1
        with:
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Apply repo secret
        run: kubectl apply -f k8s/argocd/repo-secret.yaml

      - name: Apply infrastructure applications
        run: kubectl apply -f k8s/argocd/infra-apps.yaml

      - name: Wait for gateway-api sync
        uses: AshleyHollis/shared-infra/.github/actions/argocd-wait@v1
        with:
          app-name: gateway-api
          namespace: gateway-system
          max-wait-seconds: '300'
          cleanup-stuck-operations: 'true'
          auto-recovery: 'true'

      - name: Wait for certificates sync
        uses: AshleyHollis/shared-infra/.github/actions/argocd-wait@v1
        with:
          app-name: certificates
          namespace: gateway-system
          max-wait-seconds: '120'

      - name: Wait for external-dns sync
        uses: AshleyHollis/shared-infra/.github/actions/argocd-wait@v1
        with:
          app-name: external-dns
          namespace: gateway-system
          max-wait-seconds: '120'

      - name: Verify all infrastructure applications
        run: |
          echo "=== Final Infrastructure Status ==="
          kubectl get applications -n argocd -o custom-columns=\
          'NAME:.metadata.name,SYNC:.status.sync.status,HEALTH:.status.health.status'
