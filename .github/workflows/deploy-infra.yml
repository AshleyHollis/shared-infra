# =============================================================================
# Deploy Shared Infrastructure to AKS
# =============================================================================
# Applies ArgoCD Application manifests (infra-apps.yaml) to the cluster
# whenever shared infrastructure changes are merged to main.
#
# This ensures that ArgoCD Applications stay in sync with the repo.
# Without this, changes to infra-apps.yaml, gateway configs, certificates,
# etc. would not take effect until manually kubectl apply'd.
# =============================================================================

name: Deploy Infrastructure

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Apply ArgoCD Infrastructure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Azure and AKS
        uses: AshleyHollis/shared-infra/.github/actions/setup-azure-aks@v1
        with:
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Apply repo secret
        run: |
          echo "Registering shared-infra repo with ArgoCD..."
          kubectl apply -f k8s/argocd/repo-secret.yaml
          echo "✓ Repo secret applied"

      - name: Apply infrastructure applications
        run: |
          echo "Applying ArgoCD infrastructure applications..."
          kubectl apply -f k8s/argocd/infra-apps.yaml
          echo "✓ Infrastructure applications applied"

      - name: Force refresh OutOfSync applications
        run: |
          APPS=(gateway-api certificates external-dns cert-manager external-secrets
                cert-manager-clusterissuers eso-cluster-secretstore ingress-nginx)

          for app in "${APPS[@]}"; do
            if kubectl get application "$app" -n argocd &>/dev/null; then
              SYNC=$(kubectl get application "$app" -n argocd -o jsonpath='{.status.sync.status}' 2>/dev/null)
              if [[ "$SYNC" != "Synced" ]]; then
                echo "Forcing hard refresh on $app (status: $SYNC)..."
                kubectl annotate application "$app" -n argocd \
                  argocd.argoproj.io/refresh=hard --overwrite
              fi
            fi
          done

      - name: Wait for sync convergence
        run: |
          echo "Waiting 30s for ArgoCD to sync..."
          sleep 30

      - name: Verify ArgoCD applications
        run: |
          echo "=== ArgoCD Infrastructure Applications ==="
          kubectl get applications -n argocd -o custom-columns=\
          'NAME:.metadata.name,SYNC:.status.sync.status,HEALTH:.status.health.status' \
          2>/dev/null || echo "Warning: Could not list applications"

          echo ""
          echo "=== Key Application Status ==="
          APPS=(gateway-api certificates external-dns cert-manager external-secrets)
          FAILED=false

          for app in "${APPS[@]}"; do
            if kubectl get application "$app" -n argocd &>/dev/null; then
              SYNC=$(kubectl get application "$app" -n argocd -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "Unknown")
              HEALTH=$(kubectl get application "$app" -n argocd -o jsonpath='{.status.health.status}' 2>/dev/null || echo "Unknown")
              echo "✓ $app (sync: $SYNC, health: $HEALTH)"

              if [[ "$SYNC" != "Synced" ]]; then
                echo "  Sync conditions:"
                kubectl get application "$app" -n argocd \
                  -o jsonpath='{.status.conditions[*].message}' 2>/dev/null || true
                echo ""
                FAILED=true
              fi
            else
              echo "✗ $app NOT FOUND"
              FAILED=true
            fi
          done

          if [[ "$FAILED" == "true" ]]; then
            echo ""
            echo "::warning::Some applications are not fully synced. Check ArgoCD for details."
          fi
