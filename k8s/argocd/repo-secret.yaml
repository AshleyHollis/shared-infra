# =============================================================================
# Argo CD Repository Secret
# =============================================================================
# Registers the shared-infra repo with Argo CD (public repo - no credentials)
apiVersion: v1
kind: Secret
metadata:
  name: shared-infra-repo
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
stringData:
  type: git
  url: https://github.com/AshleyHollis/shared-infra.git
