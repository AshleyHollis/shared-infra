# =============================================================================
# Argo CD Infrastructure Applications
# =============================================================================
# Shared cluster-level infrastructure components used by all applications.
# Moved from yt-summarizer to shared-infra for multi-app support.
#
# Usage:
#   kubectl apply -f k8s/argocd/infra-apps.yaml
# =============================================================================

---
# -----------------------------------------------------------------------------
# Ingress NGINX Controller
# Provides external access to services via Ingress resources
# -----------------------------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.9.1
    helm:
      valuesObject:
        controller:
          replicaCount: 1
          # Cost-optimized resource limits for single-node cluster
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # LoadBalancer for Azure external IP
          service:
            type: LoadBalancer
            annotations:
              service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: /healthz
          # Enable metrics for observability
          metrics:
            enabled: true
          # Admission webhooks for Ingress validation
          admissionWebhooks:
            enabled: true
        # Default backend for 404 responses
        defaultBackend:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

---
# -----------------------------------------------------------------------------
# External Secrets Operator
# Syncs secrets from Azure Key Vault to Kubernetes Secrets
# -----------------------------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 0.9.13
    helm:
      valuesObject:
        installCRDs: true
        # Cost-optimized resource limits
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        webhook:
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
        certController:
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

---
# -----------------------------------------------------------------------------
# Cert-Manager (Helm)
# Installs cert-manager to provide ACME certificate management
# -----------------------------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  finalizers:
    - resources-finalizer.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    targetRevision: v1.14.0
    helm:
      valuesObject:
        installCRDs: true
        webhook:
          enabled: true
        cainjector:
          enabled: true
        # Cost-optimized resources for single-node cluster
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

---
# -----------------------------------------------------------------------------
# Apply cert-manager ClusterIssuer manifests (staging + prod + cloudflare)
# -----------------------------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager-clusterissuers
  namespace: argocd
  finalizers:
    - resources-finalizer.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/AshleyHollis/shared-infra
    targetRevision: main
    path: k8s/argocd/cert-manager
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

---
# -----------------------------------------------------------------------------
# ClusterSecretStore for Azure Key Vault
# Shared across all namespaces for preview environments
# Note: References yt-summarizer:yt-summarizer-sa for workload identity auth
# -----------------------------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eso-cluster-secretstore
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # Deploy after ESO is installed
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/AshleyHollis/shared-infra
    targetRevision: main
    path: k8s/cluster-resources
  destination:
    server: https://kubernetes.default.svc
    namespace: yt-summarizer
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

---
# -----------------------------------------------------------------------------
# Gateway API Infrastructure
# Gateway API CRDs, NGINX Gateway Fabric, and shared Gateway
# Serves all applications (yt-summarizer, meal-planner, etc.)
# -----------------------------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-api
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://github.com/AshleyHollis/shared-infra
    targetRevision: main
    path: k8s/argocd/gateway-api
  destination:
    server: https://kubernetes.default.svc
    namespace: gateway-system
  ignoreDifferences:
    - group: gateway.networking.k8s.io
      kind: Gateway
      jsonPointers:
        - /status
    - group: external-secrets.io
      kind: ExternalSecret
      jsonPointers:
        - /status
        - /spec/data/0/remoteRef/conversionStrategy
        - /spec/data/0/remoteRef/decodingStrategy
        - /spec/data/0/remoteRef/metadataPolicy
        - /spec/target/creationPolicy
        - /spec/target/deletionPolicy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true

---
# -----------------------------------------------------------------------------
# ExternalDNS
# Manages Cloudflare DNS records based on HTTPRoute resources
# -----------------------------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: default
  source:
    repoURL: https://github.com/AshleyHollis/shared-infra
    targetRevision: main
    path: k8s/argocd/external-dns
  destination:
    server: https://kubernetes.default.svc
    namespace: gateway-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

---
# -----------------------------------------------------------------------------
# Wildcard Certificates
# Let's Encrypt wildcard certificates for all applications
# (*.yt-summarizer.apps.ashleyhollis.com, *.meal-planner.apps.ashleyhollis.com)
# -----------------------------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: certificates
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://github.com/AshleyHollis/shared-infra
    targetRevision: main
    path: k8s/argocd/certificates
  destination:
    server: https://kubernetes.default.svc
    namespace: gateway-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
